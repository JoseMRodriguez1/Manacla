<article class="group flex flex-col bg-white rounded-lg shadow-sm hover:shadow-md transition-all duration-300 overflow-hidden cursor-pointer h-full border border-gray-100">
  <div class="relative w-full aspect-[4/3] overflow-hidden bg-gray-100">
    <span *ngIf="item().badge" class="absolute top-3 right-3 z-10 bg-brand-accent text-white text-xs font-bold px-2 py-1 rounded shadow-sm">
      {{ item().badge }}
    </span>
    <img [ngSrc]="item().imageUrl" [alt]="item().title" fill class="object-cover transition-transform duration-500 group-hover:scale-105" sizes="(max-width: 768px) 100vw, 33vw" />
  </div>
  <div class="p-5 flex-grow flex flex-col justify-center">
    <h3 class="text-xl font-bold text-brand-primary mb-2">{{ item().title }}</h3>
    <p class="text-sm text-gray-600 leading-relaxed">{{ item().description }}</p>
  </div>
</article>
